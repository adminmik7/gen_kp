<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка файлов</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            margin: 0;
            padding: 20px;
            background: var(--bg-tertiary, #f1f5f9);
            color: var(--text-primary, #0f172a);
            font-size: 10pt;
            min-height: 100%;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-secondary, #ffffff);
            border: 1px solid var(--border-light, #e2e8f0);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .file-item:hover {
            border-color: var(--accent-gradient-start, #7c3aed);
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.1);
        }
        .file-item.active {
            border-color: var(--accent-gradient-start, #7c3aed);
            background: var(--bg-tertiary, #f1f5f9);
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }
        .file-name {
            font-weight: 600;
            color: var(--text-primary, #0f172a);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-meta {
            font-size: 0.8rem;
            color: var(--text-muted, #64748b);
            margin-top: 4px;
        }

        .file-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .file-actions button {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .btn-load-file {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }
        .btn-load-file:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }
        .btn-preview-file {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }
        .btn-preview-file:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .btn-delete-file {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
          .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted, #64748b);
        }
        .empty-state svg {
            width: 48px;
            height: 48px;
            color: var(--text-muted, #64748b);
            margin-bottom: 12px;
        }
        .empty-state p {
            margin: 0;
            font-size: 0.95rem;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: var(--text-muted, #64748b);
        }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border-light, #e2e8f0);
            border-top-color: var(--accent-gradient-start, #7c3aed);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }
        .preview-modal-content {
            background: var(--bg-secondary, #ffffff);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .preview-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light, #e2e8f0);
        }
        .preview-modal-header h3 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-primary, #0f172a);
        }
        .preview-modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted, #64748b);
            cursor: pointer;
        }
        .preview-modal-body {
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-secondary, #374151);
        }
        .preview-modal-body pre {
            background: var(--bg-tertiary, #f1f5f9);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .search-box {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-secondary, #ffffff);
            border: 1px solid var(--border-light, #e2e8f0);
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text-primary, #0f172a);
            margin-bottom: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box:focus {
            outline: none;
            border-color: var(--accent-gradient-start, #7c3aed);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }
        .search-box::placeholder {
            color: var(--text-muted, #64748b);
        }

        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .stat-item {
            padding: 8px 14px;
            background: var(--bg-secondary, #ffffff);
            border: 1px solid var(--border-light, #e2e8f0);
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-muted, #64748b);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .stat-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-item.active {
            border-color: var(--accent-gradient-start, #7c3aed);
            background: linear-gradient(135deg, #ede9fe 0%, #f1f5f9 100%);
            color: var(--text-primary, #0f172a);
        }
        .stat-item.sort-btn {
            background: var(--bg-tertiary, #f1f5f9);
            color: var(--text-primary, #0f172a);
        }
        .stat-item.sort-btn:hover {
            background: var(--bg-secondary, #ffffff);
        }
        .stat-item.sort-btn.active {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            color: white;
        }
        .modal-btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-btn.cancel {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(239,68,68,0.2);
        }
        .modal-btn.cancel:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(239,68,68,0.3);
        }
        .modal-btn.confirm {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(34,197,94,0.2);
        }
        .modal-btn.confirm:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(34,197,94,0.3);
        }
    </style>
</head>
<body>

<div class="loading" id="loadingState">
    <div class="spinner"></div>
    <p>Загрузка списка файлов...</p>
</div>

<div id="contentArea" style="display: none;">
    <input type="text" class="search-box" id="searchBox" placeholder="Поиск по имени файла...">

    <div class="stats" id="statsArea"></div>

    <div class="file-list" id="fileList"></div>
</div>

<script>
    // ========== Связь с parent (index.html) ==========
    function sendMessage(action, data) {
        window.parent.postMessage({ action, data }, '*');
    }

  // ========== Загрузка списка файлов ==========
    async function loadFileList() {
        const loadingState = document.getElementById('loadingState');
        const contentArea = document.getElementById('contentArea');
        const fileList = document.getElementById('fileList');
        const statsArea = document.getElementById('statsArea');

        loadingState.style.display = 'block';
        contentArea.style.display = 'none';

        try {
            const response = await fetch('/api/files');
            const data = await response.json();

            if (data.success) {
                files = data.files || [];
                
                // Перечитать createdBy из JSON файла для каждого файла
                files = await refreshCreatedBy();
            } else {
                files = [];
            }
        } catch (err) {
            console.error('Ошибка загрузки списка файлов:', err);
            files = [];
        }

        files.sort((a, b) => new Date(b.modifiedAt || b.date) - new Date(a.modifiedAt || a.date));
        updateLoadingState();
    }

    // ========== Рендер списка файлов ==========
    function renderFileList(fileList, loading = false) {
        const container = document.getElementById('fileList');
        const fragment = document.createDocumentFragment();

        if (fileList.length === 0) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty-state';
            emptyDiv.innerHTML = '<p>Ничего не найдено</p>';
            fragment.appendChild(emptyDiv);
        } else if (loading) {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'file-item';
            loadingDiv.style.justifyContent = 'center';
            loadingDiv.style.alignItems = 'center';
            loadingDiv.style.padding = '20px';
            loadingDiv.innerHTML = `
                <div class="loading-spinner" style="display:flex;flex-direction:column;align-items:center;gap:8px;">
                    <div class="spinner" style="width:28px;height:28px;"></div>
                    <p style="font-size:0.9rem;color:var(--text-muted);margin:0;">${escapeHtml(fileList[0].name || 'Загрузка...')}</p>
                </div>
            `;
            fragment.appendChild(loadingDiv);
        } else {
            fileList.forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.dataset.filename = file.name;

                const date = file.modifiedAt || file.date;
                const formattedDate = date ? new Date(date).toLocaleString('ru-RU') : '—';
                const size = file.size ? formatFileSize(file.size) : '—';
                const author = file.createdBy || '—';

                item.innerHTML = `
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(file.customer || file.name)}</div>
                        <div class="file-meta">${formattedDate} · ${size} · ${escapeHtml(author)}</div>
                    </div>
                    <div class="file-actions">
                        <button class="btn-preview-file" onclick="event.stopPropagation(); previewFile('${escapeHtml(file.name)}')" title="Просмотр">
                            👁 Просмотр
                        </button>
                        <button class="btn-load-file" onclick="event.stopPropagation(); loadFile('${escapeHtml(file.name)}')" title="Загрузить в форму">
                            ⬇ Загрузить
                        </button>
                    </div>
                `;

                fragment.appendChild(item);
            });
        }

        container.replaceChildren(fragment);

        // Обновляем active класс у элементов списка
        document.querySelectorAll('.file-item').forEach(el => {
            const filename = el.dataset.filename;
            if (filename === window.activeFile) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
        });
    }

    // ========== Сортировка по автору ==========
    let currentSortAuthor = 'all';
    
    function sortByAuthor(author, btnElement) {
        currentSortAuthor = author;
        
        // Обновляем активную кнопку
        document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        
        // Применяем фильтр
        if (author === 'all') {
            filteredFiles = [...files];
        } else {
            filteredFiles = files.filter(f => f.createdBy === author);
        }
        
        renderFileList(filteredFiles);
    }

    // ========== Поиск ==========
    document.getElementById('searchBox').addEventListener('input', function() {
        const query = this.value.toLowerCase().trim();
        if (!query) {
            filteredFiles = [...files];
        } else {
            filteredFiles = files.filter(f => (f.name || '').toLowerCase().includes(query) || (f.customer || '').toLowerCase().includes(query));
        }
        renderFileList(filteredFiles);
    });

    // ========== Перечитать createdBy и customer из JSON файла ==========
    async function refreshCreatedBy() {
        const promises = files.map(async (file) => {
            try {
                const response = await fetch(`/api/files/${encodeURIComponent(file.name)}`);
                const data = await response.json();
                if (data.success) {
                    if (data.data.createdBy) {
                        file.createdBy = data.data.createdBy;
                    }
                    if (data.data.meta && data.data.meta.customer) {
                        file.customer = data.data.meta.customer;
                    }
                }
            } catch (err) {
                console.error(`Ошибка чтения данных для ${file.name}:`, err);
            }
            return file;
        });
        await Promise.all(promises);
        return files;
    }

    // ========== Загрузка файла в форму ==========
    let activeFile = null;
    let activeFileData = null;

    function loadFile(filename) {
        fetch(`/api/files/${encodeURIComponent(filename)}`)
            .then(r => r.json())
            .then(data => {
                if (!data.success) {
                    sendMessage('showToast', { message: 'Ошибка: ' + data.error, type: 'error' });
                    return;
                }
                const createdBy = data.data.createdBy || '';
                const currentUser = localStorage.getItem('gen_cp_user') || '';
                if (createdBy && currentUser && createdBy !== currentUser) {
                    showLoadConfirmModal(filename, data.data, createdBy);
                } else {
                    activeFile = filename;
                    activeFileData = data.data;
                    sendMessage('loadFile', data.data);
                }
            })
            .catch(err => {
                sendMessage('showToast', { message: 'Ошибка загрузки: ' + err.message, type: 'error' });
            });
    }

    // ========== Модальное окно подтверждения загрузки от другого автора ==========
    function showLoadConfirmModal(filename, data, createdBy) {
        const modal = document.createElement('div');
        modal.className = 'preview-modal';
        modal.innerHTML = `
            <div class="preview-modal-content">
                <div class="preview-modal-header">
                    <h3>Файл создан другим пользователем</h3>
                    <button class="preview-modal-close" id="loadModalClose">&times;</button>
                </div>
                <div class="preview-modal-body">
                    <p>Файл создан пользователем: <strong>${escapeHtml(createdBy)}</strong></p>
                    <p>Рекомендуем связаться с автором для согласования.</p>
                    <p>Загрузить файл?</p>
                    <div style="display:flex;gap:12px;margin-top:16px;justify-content:flex-end;">
                        <button class="modal-btn cancel" id="loadModalCancel">Отмена</button>
                        <button class="modal-btn confirm" id="loadModalConfirm">Загрузить</button>
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        modal.querySelector('#loadModalClose').addEventListener('click', () => {
            modal.remove();
            sendMessage('showToast', { message: 'Загрузка отменена', type: 'info' });
        });
        modal.querySelector('#loadModalCancel').addEventListener('click', () => {
            modal.remove();
            sendMessage('showToast', { message: 'Загрузка отменена', type: 'info' });
        });
        modal.querySelector('#loadModalConfirm').addEventListener('click', () => {
            modal.remove();
            sendMessage('loadFile', data);
        });
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }

    // ========== Просмотр файла ==========
    function previewFile(filename) {
        fetch(`/api/files/${encodeURIComponent(filename)}`)
            .then(r => r.json())
            .then(data => {
                if (!data.success) throw new Error(data.error);

                const meta = data.data.meta || {};
                const conditions = data.data.conditions || {};
                const items = data.data.items || [];

                const html = `
                    <div class="preview-modal-body">
                        <h4 style="margin-top:0;">Информация о сделке</h4>
                        <p><strong>Заказчик:</strong> ${escapeHtml(meta.customer || '—')}</p>
                        <p><strong>Дата:</strong> ${meta.date ? new Date(meta.date).toLocaleDateString('ru-RU') : '—'}</p>
                        <p><strong>Номер КП:</strong> ${escapeHtml(meta.kpNumber || '—')}</p>
                        <p><strong>Срок действия:</strong> ${escapeHtml(meta.validityDays || '—')} дней</p>
                        <p><strong>Автор:</strong> ${escapeHtml(data.data.createdBy || '—')}</p>
                        <hr style="border: none; border-top: 1px solid var(--border-light, #e2e8f0); margin: 16px 0;">
                        <h4>Условия</h4>
                        <p><strong>Оплата:</strong> ${escapeHtml(conditions.payment || '—')}</p>
                        <p><strong>Поставка:</strong> ${escapeHtml(conditions.deliveryTime || '—')}</p>
                        <p><strong>Гарантия:</strong> ${escapeHtml(conditions.warranty || '—')}</p>
                        <p><strong>Доставка:</strong> ${escapeHtml(conditions.shipping || '—')}</p>
                        <hr style="border: none; border-top: 1px solid var(--border-light, #e2e8f0); margin: 16px 0;">
                        <h4>Позиции (${items.length})</h4>
                        ${items.length > 0 ? '<pre>' + items.map((item, i) => {
                            const sumNoVat = (item.qty * item.price).toFixed(2).replace('.', ',');
                            const totalSum = (item.qty * item.price * (1 + item.vatRate / 100)).toFixed(2).replace('.', ',');
                            return `${i + 1}. ${item.name} | ${item.qty} ${item.unit} × ${item.price.toFixed(2).replace('.', ',')} = ${sumNoVat} (${item.vatRate}%) → ${totalSum}`;
                        }).join('\n') + '</pre>' : '<p>Нет позиций</p>'}
                    </div>
                `;

                const modal = document.createElement('div');
                modal.className = 'preview-modal';
                modal.innerHTML = `
                    <div class="preview-modal-content">
                        <div class="preview-modal-header">
                            <h3>${escapeHtml(filename)}</h3>
                            <button class="preview-modal-close" id="previewClose">&times;</button>
                        </div>
                        ${html}
                    </div>
                `;
                document.body.appendChild(modal);

                modal.querySelector('#previewClose').addEventListener('click', () => modal.remove());
                modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
            })
            .catch(err => {
                sendMessage('showToast', { message: 'Ошибка просмотра: ' + err.message, type: 'error' });
            });
    }

    // ========== Утилиты ==========
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatFileSize(bytes) {
        if (!bytes || bytes === 0) return '0 Б';
        const k = 1024;
        const sizes = ['Б', 'КБ', 'МБ', 'ГБ'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

// ========== Инициализация ==========
    const urlParams = new URLSearchParams(window.location.search);
    const filesParam = urlParams.get('files') || '';
    const updateParam = urlParams.get('update') || '';
    
    let lastUpdate = '';
    let isLoaded = false;

    function initFileList() {
        if (filesParam) {
            const fileNames = filesParam.split(',');
            console.log('[Load HTML] Получен список файлов из URL:', fileNames);
            fetch('/api/files')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        files = data.files || [];
                        console.log('[Load HTML] Получено файлов:', files.length);
                        lastUpdate = updateParam;
                    } else {
                        files = [];
                        console.log('[Load HTML] Ошибка:', data.error);
                    }
                    files.sort((a, b) => new Date(b.modifiedAt || b.date) - new Date(a.modifiedAt || a.date));
                    return refreshCreatedBy();
                })
                .then(() => {
                    isLoaded = true;
                    updateLoadingState();
                    window.serverFilesLastUpdate = lastUpdate;
               });
        } else {
            fetch('/api/files')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        files = data.files || [];
                        console.log('[Load HTML] Получено файлов:', files.length);
                        lastUpdate = updateParam;
                    } else {
                        files = [];
                        console.log('[Load HTML] Ошибка:', data.error);
                    }
                    files.sort((a, b) => new Date(b.modifiedAt || b.date) - new Date(a.modifiedAt || a.date));
                    return refreshCreatedBy();
                })
                .then(() => {
                    isLoaded = true;
                    updateLoadingState();
                    window.serverFilesLastUpdate = lastUpdate;
                });
        }

        // Обновляем при изменении времени обновления
        if (window.serverFilesLastUpdate && window.serverFilesLastUpdate !== lastUpdate) {
            console.log('[Load HTML] Обновление списка файлов:', window.serverFilesLastUpdate);
            fetch('/api/files')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        files = data.files || [];
                        lastUpdate = window.serverFilesLastUpdate;
                    } else {
                        files = [];
                    }
                    files.sort((a, b) => new Date(b.modifiedAt || b.date) - new Date(a.modifiedAt || a.date));
                    return refreshCreatedBy();
                })
                .then(() => {
                    isLoaded = true;
                    updateLoadingState();
                    window.serverFilesLastUpdate = lastUpdate;
                });
       }
    }

    // Запускаем инициализацию
    initFileList();

    function updateLoadingState() {
        const loadingState = document.getElementById('loadingState');
        const contentArea = document.getElementById('contentArea');
        const fileList = document.getElementById('fileList');
        const statsArea = document.getElementById('statsArea');

        // Если файлы загружены, показываем их
        if (isLoaded) {
            loadingState.style.display = 'none';
            contentArea.style.display = 'block';
        } else {
            // Пока файлы загружаются, показываем спиннер
            loadingState.style.display = 'block';
            contentArea.style.display = 'none';
        }

        if (files.length === 0) {
            fileList.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                    </svg>
                    <p>Нет сохранённых файлов</p>
                </div>
            `;
            statsArea.innerHTML = '';
        } else {
            renderFileList(files, false);
            const authors = new Set(files.map(f => f.createdBy || '—'));
            const sortedAuthors = Array.from(authors).sort();
            
            let buttonsHtml = `
                <div class="stat-item sort-btn" data-author="all" onclick="sortByAuthor('all', this)">
                    📁 Все
                </div>
            `;
            
            for (const author of sortedAuthors) {
                const escapedAuthor = escapeHtml(author);
                buttonsHtml += `
                    <div class="stat-item sort-btn" data-author="${escapeHtml(author)}" onclick="sortByAuthor('${escapeHtml(author)}', this)">
                        📄 ${escapedAuthor}
                    </div>
                `;
            }
            
            statsArea.innerHTML = buttonsHtml;
        }
    }

    // Запускаем инициализацию
    initFileList();

   // Обработка события от parent (index.html)
    window.addEventListener('message', function(e) {
        if (!e.data || !e.data.action) return;

        switch (e.data.action) {
            case 'refreshFileList':
                if (window.serverFilesList && window.serverFilesList.length > 0) {
                    const fileNames = window.serverFilesList.map(f => f.name).join(', ');
                    console.log('[Load HTML] refreshFileList:', fileNames);
                    initFileList(); // Перезагружаем файлы с новыми данными
                } else {
                    console.log('[Load HTML] refreshFileList: список файлов пуст');
                }
                break;
        }
    });
</script>

</body>
</html>
